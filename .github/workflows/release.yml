# voxne-local release workflow
# ==============================
# Triggered by a version tag push (e.g. v0.1.2).
#
# Builds a self-contained Windows binary (~2.5GB) and publishes it. The binary
# exceeds GitHub's 2GiB per-asset release limit, so it is NOT attached to the
# GitHub Release — it's uploaded to Cloudflare R2 instead. The GitHub Release
# stays as the lightweight "what's the latest version" pointer that the app's
# CheckForUpdate()/manager.go reads (tag name only, no large asset attached).
#
# Usage:
#   git tag v0.1.2
#   git push origin v0.1.2
#
# Version pointer: github.com/mixmastermike/voxne-local/releases
# Actual binary:   R2 bucket "voxne", under voxne-local/<tag>/ and voxne-local/latest/
#
# Requires repo secrets: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write   # required to create a GitHub Release

jobs:

  # ---------------------------------------------------------------------------
  # Build — Windows amd64
  # ---------------------------------------------------------------------------
  build:
    runs-on: windows-latest
    name: Build (voxne-local-windows-amd64.exe)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-build.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install PyTorch (CUDA 12.4 — GPU inference on user machines)
        run: |
          pip install --upgrade pip
          pip install torch==2.6.0 torchaudio==2.6.0 --index-url https://download.pytorch.org/whl/cu124

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build binary
        run: python build.py

      - name: Rename binary
        shell: bash
        run: mv dist/voxne-local.exe dist/voxne-local-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxne-local-windows-amd64.exe
          path: dist/voxne-local-windows-amd64.exe
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Release — publish to GitHub Releases
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums.txt
        working-directory: dist
        run: |
          sha256sum voxne-local-windows-amd64.exe > checksums.txt
          cat checksums.txt

      - name: Upload binary to R2 (versioned copy + latest pointer)
        working-directory: dist
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://f3d7a34807aa25ae756e73071763e3eb.r2.cloudflarestorage.com
          R2_BUCKET: voxne
        run: |
          aws s3 cp voxne-local-windows-amd64.exe "s3://$R2_BUCKET/voxne-local/${{ github.ref_name }}/voxne-local-windows-amd64.exe" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp checksums.txt "s3://$R2_BUCKET/voxne-local/${{ github.ref_name }}/checksums.txt" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp voxne-local-windows-amd64.exe "s3://$R2_BUCKET/voxne-local/latest/voxne-local-windows-amd64.exe" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp checksums.txt "s3://$R2_BUCKET/voxne-local/latest/checksums.txt" --endpoint-url "$R2_ENDPOINT"

      - name: Prune old R2 versions (keep last 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://f3d7a34807aa25ae756e73071763e3eb.r2.cloudflarestorage.com
          R2_BUCKET: voxne
        run: |
          KEEP=3
          echo "Listing versioned prefixes under voxne-local/ ..."
          PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "$R2_BUCKET" \
            --prefix "voxne-local/" \
            --delimiter "/" \
            --endpoint-url "$R2_ENDPOINT" \
            --query "CommonPrefixes[].Prefix" \
            --output text)

          # Extract version folder names (e.g. "v0.1.2"), excluding "latest"
          VERSIONS=$(echo "$PREFIXES" | tr '\t' '\n' | sed -E 's#voxne-local/([^/]+)/#\1#' | grep -v '^latest$' | sort -V)

          echo "Found versioned release(s):"
          echo "$VERSIONS"

          TO_DELETE=$(echo "$VERSIONS" | head -n -"$KEEP")

          if [ -z "$TO_DELETE" ]; then
            echo "Nothing to prune (fewer than $KEEP versions on hand)."
          else
            echo "Pruning old versions:"
            echo "$TO_DELETE"
            for v in $TO_DELETE; do
              aws s3 rm "s3://$R2_BUCKET/voxne-local/$v/" --recursive --endpoint-url "$R2_ENDPOINT"
            done
          fi

      - name: Create release (version pointer only — binary hosted on R2, see workflow header)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Binary hosted on R2 (exceeds GitHub's 2GiB release-asset limit):
            https://pub-3fd7d09d2aba4887a9ebb141cf1e3a8f.r2.dev/voxne-local/${{ github.ref_name }}/voxne-local-windows-amd64.exe
          files: |
            dist/checksums.txt
